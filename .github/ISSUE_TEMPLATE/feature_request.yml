name: 功能建议
description: 提出新功能、体验优化或中转站兼容建议。
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: scenario
    attributes:
      label: 使用场景
      description: 说明为什么需要这个功能，以及它解决什么实际问题。
      placeholder: 例如：我有多个 sub2api 中转站，希望...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 期望方案
      description: 描述你希望 BalanceHub 怎么做。
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: 其他方案
      description: 如果你尝试过临时替代方案，可以写在这里。
    validations:
      required: false
