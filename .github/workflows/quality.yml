name: 质量检查

on:
  workflow_call:

permissions:
  contents: read

jobs:
  quality:
    name: 质量检查（${{ matrix.label }}）
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux x64
            os: ubuntu-22.04
            frontend: true
            format: true
          - label: Windows x64
            os: windows-latest
            frontend: false
            format: false
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        if: matrix.frontend
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 设置 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: balancehub-quality
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: 安装 Linux 构建依赖
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            rpm \
            xdg-utils \
            patchelf

      - name: 安装前端依赖
        if: matrix.frontend
        run: npm ci

      - name: 构建前端
        if: matrix.frontend
        run: npm run build

      - name: 检查 Rust 格式
        if: matrix.format
        working-directory: src-tauri
        run: cargo fmt --check

      - name: 运行 Clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: 运行 Rust 测试
        working-directory: src-tauri
        run: cargo test
