name: 发布打包

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  quality:
    name: 发布前质量检查
    uses: ./.github/workflows/quality.yml

  prepare:
    name: 准备 Draft Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
      release_body: ${{ steps.release_notes.outputs.release_body }}
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 生成发布说明
        id: release_notes
        run: node .github/scripts/release-notes.mjs ${{ github.ref_name }}

      - name: 创建 Draft Release
        id: release
        uses: actions/github-script@v7
        env:
          RELEASE_BODY: ${{ steps.release_notes.outputs.release_body }}
        with:
          script: |
            const tag = context.ref.replace("refs/tags/", "");
            let existing = null;
            try {
              existing = (await github.rest.repos.getReleaseByTag({
                ...context.repo,
                tag,
              })).data;
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            if (existing && !existing.draft) {
              core.setFailed(`Release ${tag} 已发布，拒绝覆盖现有版本`);
              return;
            }

            if (existing) {
              for (const asset of existing.assets) {
                await github.rest.repos.deleteReleaseAsset({
                  ...context.repo,
                  asset_id: asset.id,
                });
              }
            }

            const release = existing
              ? await github.rest.repos.updateRelease({
                  ...context.repo,
                  release_id: existing.id,
                  name: tag,
                  body: process.env.RELEASE_BODY,
                  draft: true,
                  prerelease: false,
                })
              : await github.rest.repos.createRelease({
                  ...context.repo,
                  tag_name: tag,
                  name: tag,
                  body: process.env.RELEASE_BODY,
                  draft: true,
                  prerelease: false,
                  generate_release_notes: false,
                });

            core.setOutput("release_id", String(release.data.id));

  build:
    name: 构建 ${{ matrix.label }}
    needs:
      - prepare
      - quality
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        include:
          - label: macOS Apple Silicon
            os: macos-15
            rust-target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles app,dmg --config src-tauri/tauri.release.conf.json
          - label: macOS Intel
            os: macos-15-intel
            rust-target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles app,dmg --config src-tauri/tauri.release.conf.json
          - label: Windows x64
            os: windows-latest
            rust-target: ""
            args: --bundles nsis --config src-tauri/tauri.release.conf.json
          - label: Windows ARM64
            os: windows-11-arm
            rust-target: ""
            args: --bundles nsis --config src-tauri/tauri.release.conf.json
          - label: Linux x64
            os: ubuntu-22.04
            rust-target: ""
            args: --bundles appimage,deb,rpm --config src-tauri/tauri.release.conf.json
          - label: Linux ARM64
            os: ubuntu-24.04-arm
            rust-target: ""
            args: --bundles appimage,deb,rpm --config src-tauri/tauri.release.conf.json
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 设置 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: balancehub-tauri
          save-if: false

      - name: 添加 Rust 目标平台
        if: matrix.rust-target != ''
        run: rustup target add ${{ matrix.rust-target }}

      - name: 安装 Linux 构建依赖
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            rpm \
            xdg-utils \
            patchelf

      - name: 安装前端依赖
        run: npm ci

      - name: 构建 Tauri 应用
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.prepare.outputs.release_id }}
          tagName: ${{ github.ref_name }}
          releaseBody: ${{ needs.prepare.outputs.release_body }}
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: false
          retryAttempts: 3
          args: ${{ matrix.args }}

  manifest:
    name: 生成更新清单
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 生成并上传 latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ needs.prepare.outputs.release_id }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_BODY: ${{ needs.prepare.outputs.release_body }}
        run: node .github/scripts/generate-updater-json.mjs

  publish:
    name: 发布完整版本
    needs:
      - prepare
      - build
      - manifest
    runs-on: ubuntu-latest
    steps:
      - name: 发布 Release
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.prepare.outputs.release_id }}
        with:
          script: |
            const releaseId = Number(process.env.RELEASE_ID);
            if (!Number.isSafeInteger(releaseId)) {
              throw new Error("缺少有效的 Draft Release ID");
            }

            const release = (await github.rest.repos.getRelease({
              ...context.repo,
              release_id: releaseId,
            })).data;
            const tag = context.ref.replace("refs/tags/", "");
            if (release.tag_name !== tag || !release.draft) {
              throw new Error(`Draft Release 状态异常: ${release.tag_name}`);
            }

            await github.rest.repos.updateRelease({
              ...context.repo,
              release_id: releaseId,
              draft: false,
              prerelease: false,
              make_latest: "true",
            });
