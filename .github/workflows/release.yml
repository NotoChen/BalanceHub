name: 发布打包

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: 构建 ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon
            os: macos-latest
            rust-target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles app,dmg --config src-tauri/tauri.release.conf.json
          - label: macOS Intel
            os: macos-latest
            rust-target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles app,dmg --config src-tauri/tauri.release.conf.json
          - label: Windows x64
            os: windows-latest
            rust-target: ""
            args: --bundles nsis --config src-tauri/tauri.release.conf.json
          - label: Windows ARM64
            os: windows-11-arm
            rust-target: ""
            args: --bundles nsis --config src-tauri/tauri.release.conf.json
          - label: Linux x64
            os: ubuntu-22.04
            rust-target: ""
            args: --bundles appimage,deb,rpm --config src-tauri/tauri.release.conf.json
          - label: Linux ARM64
            os: ubuntu-24.04-arm
            rust-target: ""
            args: --bundles appimage,deb,rpm --config src-tauri/tauri.release.conf.json
    runs-on: ${{ matrix.os }}
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 设置 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: 添加 Rust 目标平台
        if: matrix.rust-target != ''
        run: rustup target add ${{ matrix.rust-target }}

      - name: 安装 Linux 构建依赖
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            rpm \
            xdg-utils \
            patchelf

      - name: 安装前端依赖
        run: npm ci

      - name: 生成发布说明
        id: release_notes
        run: node .github/scripts/release-notes.mjs ${{ github.ref_name }}

      - name: 构建 Tauri 应用
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: BalanceHub ${{ github.ref_name }}
          releaseBody: ${{ steps.release_notes.outputs.release_body }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
